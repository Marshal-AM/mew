name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npx hardhat compile
      - run: npx hardhat test

  wallet-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallet-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm run test:protocol
      - run: npm run test:signing
      - run: npm run test:auth-gate
      - run: npm run typecheck

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm run lint
      - run: npm run test:sql
      - run: npm run test:rls
      - run: npm run test:pipeline
      - run: npm run test:screening
      - run: npm run test:fraud

  pos-firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pos-firmware
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio
      - run: pio run -e esp32-s3-oled -e esp32-s3-tft -e esp32-oled -e esp32-tft

