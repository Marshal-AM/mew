  -D PAYMENT_TTL_SEC=300
  -D WIFI_SSID=\"MATHEWS-2.4G\"
  -D WIFI_PASSWORD=\"mathews@123\"
  -D SUBMIT_URL=\"https://pxqcsqnsgukmszuxxxbi.supabase.co/functions/v1/submit-transaction\"
  -D POS_PRODUCTS_URL=\"https://pxqcsqnsgukmszuxxxbi.supabase.co/functions/v1/pos-products\"
  -D SUPABASE_ANON_KEY=\"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cWNzcW5zZ3VrbXN6dXh4eGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NzY2NzEsImV4cCI6MjA5OTA1MjY3MX0.G1iAKUU9Zp_RPP4fN9LI990Yu2wTJE-JPoQ3OK3PELI\"

; ---------------------------------------------------------------------------
; ESP32-S3-DevKitC-1 (recommended — GPIO 22 not on header; use esp32-s3-oled)
; ---------------------------------------------------------------------------

[env:esp32-s3-oled]
board = esp32-s3-devkitc-1
upload_protocol = esptool
upload_speed = 115200
monitor_speed = 115200
board_upload.use_1200bps_touch = no
board_upload.wait_for_upload_port = no
upload_flags =
  --before=no_reset
  --after=hard_reset
build_flags =
  ${env.build_flags}
  -D BOARD_ESP32_S3=1
  -D DISPLAY_OLED=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D AUDIO_ENABLE=1
  -D BOARD_HAS_PSRAM
board_build.arduino.memory_type = qio_opi
lib_deps =
  chris--a/Keypad@^3.1.1
  adafruit/Adafruit SH110X@^2.1.11
  adafruit/Adafruit GFX Library@^1.12.1
  ricmoo/QRCode@^0.0.1
  h2zero/NimBLE-Arduino@^2.1.0
  bblanchon/ArduinoJson@^7.2.0

[env:esp32-s3-tft]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -D BOARD_ESP32_S3=1
  -D DISPLAY_TFT=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MOSI=13
  -D TFT_SCLK=12
  -D TFT_CS=10
  -D TFT_DC=11
  -D TFT_RST=2
  -D LOAD_GLCD=1
  -D SPI_FREQUENCY=27000000
lib_deps =
  chris--a/Keypad@^3.1.1
  yoprogramo/QRcodeDisplay@^2.0.0
  https://github.com/yoprogramo/QRcode_eSPI.git
  bodmer/TFT_eSPI@^2.5.43
  h2zero/NimBLE-Arduino@^2.1.0
  bblanchon/ArduinoJson@^7.2.0

; ---------------------------------------------------------------------------
; Classic ESP32 DevKit (original pin map)
; ---------------------------------------------------------------------------

[env:esp32-oled]
board = esp32dev
build_flags =
  ${env.build_flags}
  -D DISPLAY_OLED=1
lib_deps =
  chris--a/Keypad@^3.1.1
  adafruit/Adafruit SH110X@^2.1.11
  adafruit/Adafruit GFX Library@^1.12.1
  ricmoo/QRCode@^0.0.1
  h2zero/NimBLE-Arduino@^2.1.0
  bblanchon/ArduinoJson@^7.2.0

[env:esp32-tft]
board = esp32dev
build_flags =
  ${env.build_flags}
  -D DISPLAY_TFT=1
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D LOAD_GLCD=1
  -D SPI_FREQUENCY=27000000
lib_deps =
  chris--a/Keypad@^3.1.1
  yoprogramo/QRcodeDisplay@^2.0.0
  https://github.com/yoprogramo/QRcode_eSPI.git
  bodmer/TFT_eSPI@^2.5.43
  h2zero/NimBLE-Arduino@^2.1.0
  bblanchon/ArduinoJson@^7.2.0
