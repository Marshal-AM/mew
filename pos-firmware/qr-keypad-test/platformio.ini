[platformio]
default_envs = esp32-s3

; Minimal QR keypad test — flash ONLY this to validate OLED + QR + keypad.
; From repo root:  cd pos-firmware/qr-keypad-test
;                  ..\.venv\Scripts\python.exe -m platformio run -t upload
; Or run:          .\flash.ps1

[env:esp32-s3]
platform = espressif32@^6.9.0
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200
upload_protocol = esptool
upload_speed = 115200
board_upload.use_1200bps_touch = no
board_upload.wait_for_upload_port = no
upload_flags =
  --before=no_reset
  --after=hard_reset
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  chris--a/Keypad@^3.1.1
  adafruit/Adafruit SSD1306@^2.5.13
  adafruit/Adafruit GFX Library@^1.12.1
  ricmoo/QRCode@^0.0.1
